name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: LabClient-Windows
          - os: ubuntu-latest
            artifact: LabClient-Linux
          - os: macos-latest
            artifact: LabClient-macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify repository layout
        shell: bash
        run: |
          client_allowlist_regex='^client/(app\.py|downloader\.py|extractor\.py|lab_client\.spec|query_service\.py|requirements\.txt|standard_auto_downloader_core\.py|start\.bat|static/.+)$'
          required_files=(
            client/app.py
            client/downloader.py
            client/extractor.py
            client/query_service.py
            client/standard_auto_downloader_core.py
            client/requirements.txt
            client/lab_client.spec
            client/static/index_offline.html
            client/static/js/app.js
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file" >&2
              exit 1
            fi
          done

          blocked_files="$(git ls-files | grep -E '^(\.env\.example|AGENTS\.md|WINDOWS_REQUIREMENTS\.md|backend/|docs/|tools/|drivers/|landing_page/|cloudflared_lab\.yml|landing_tunnel\.yml|chrome-binaries-tunnel\.yml|backup\.py|backup\.sh|build_local\.sh|check_build_status\.sh|CHROME_MIRROR_DEPLOY\.md|DEPLOY_MANUAL\.md|DNS_SETUP\.md|GITEE_UPLOAD_INSTRUCTIONS\.md|TEST_REPORT\.md|create_gitee_release\.sh|debug_selenium\.py|deploy-chrome\.sh|download_build\.sh|release\.sh|setup_windows\.bat|start\.bat|start\.sh|start_landing\.sh|test_.*\.py|.*\.png|.*\.exe|client/bootstrap_secret\.txt|client/cache/|client/downloads/|client/__pycache__/|client/question_banks/|client/build/|client/dist/|client/lab_client\.spec\.playwright_backup|client/playwright_runtime_hook\.py)$' || true)"
          if [ -n "$blocked_files" ]; then
            echo "Repository contains files that should not be uploaded to the client repo:" >&2
            echo "$blocked_files" >&2
            exit 1
          fi

          unexpected_client_files="$(git ls-files client | grep -Ev "$client_allowlist_regex" || true)"
          if [ -n "$unexpected_client_files" ]; then
            echo "client/ contains tracked files outside the allowed release whitelist:" >&2
            echo "$unexpected_client_files" >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare bootstrap secret
        shell: bash
        env:
          LAB_CLIENT_AUTH_SECRET: ${{ secrets.LAB_CLIENT_AUTH_SECRET }}
        run: |
          if [ -z "$LAB_CLIENT_AUTH_SECRET" ]; then
            echo "Missing GitHub Actions secret: LAB_CLIENT_AUTH_SECRET" >&2
            exit 1
          fi
          printf '%s' "$LAB_CLIENT_AUTH_SECRET" > client/bootstrap_secret.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r client/requirements.txt

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        working-directory: ./client
        run: |
          pyinstaller --clean lab_client.spec

      - name: Build with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: ./client
        run: |
          pyinstaller --clean lab_client.spec

      - name: Create package (Windows)
        if: runner.os == 'Windows'
        working-directory: ./client
        run: |
          mkdir ..\release
          copy dist\LabClient.exe ..\release\lab-windows.exe

      - name: Create package (Linux)
        if: runner.os == 'Linux'
        working-directory: ./client
        run: |
          mkdir -p ../release
          cp dist/LabClient ../release/lab-linux

      - name: Create package (macOS)
        if: runner.os == 'macOS'
        working-directory: ./client
        run: |
          mkdir -p ../release
          cp dist/LabClient ../release/lab-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: LabClient-Windows
          path: release-windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: LabClient-Linux
          path: release-linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: LabClient-macOS
          path: release-macos

      - name: List files
        run: |
          echo "=== Windows ===" && ls -la release-windows/
          echo "=== Linux ===" && ls -la release-linux/
          echo "=== macOS ===" && ls -la release-macos/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-windows/lab-windows.exe
            release-linux/lab-linux
            release-macos/lab-macos
